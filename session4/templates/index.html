<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>私有知识库 - 全栈版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; margin: 0; }
        #app { max-width: 900px; margin: 30px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
        header { background: #2c3e50; color: white; padding: 20px; border-radius: 12px 12px 0 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #eee; }
        .message { margin-bottom: 20px; max-width: 85%; }
        .user { align-self: flex-end; margin-left: auto; }
        .bubble { padding: 12px 16px; border-radius: 15px; line-height: 1.6; }
        .user .bubble { background: #3498db; color: white; border-bottom-right-radius: 2px; }
        .assistant .bubble { background: #f1f3f5; color: #333; border-bottom-left-radius: 2px; }
        .source-img { width: 120px; border: 2px solid #ddd; border-radius: 6px; margin: 10px 10px 0 0; cursor: zoom-in; }
        footer { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { background: #2ecc71; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #bdc3c7; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h2 style="margin:0">私有知识库助手</h2>
            <small>基于 Qwen2.5-7B & ChromaDB</small>
        </header>

        <div id="chat-window" ref="chatWindow">
            <div v-for="(msg, i) in history" :key="i" :class="['message', msg.role]">
                <div class="bubble">[[ msg.content ]]</div>
                <div v-if="msg.sources && msg.sources.length" style="display:flex; flex-wrap:wrap">
                    <img v-for="src in msg.sources" :src="src" class="source-img" @click="window.open(src)">
                </div>
            </div>
        </div>

        <footer>
            <input v-model="input" @keyup.enter="send" :disabled="loading" placeholder="问问我关于护发素或服务器的信息...">
            <button @click="send" :disabled="loading">[[ loading ? 'AI 思考中...' : '发送' ]]</button>
        </footer>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;
        createApp({
            delimiters: ['[[', ']]'], // 防止与 Jinja2 冲突
            setup() {
                const input = ref('');
                const history = ref([{ role: 'assistant', content: '您好！我是您的私有知识库助手，我已经读完了您的 Word、Excel 和 11.jpg 图片。请问有什么可以帮您？' }]);
                const loading = ref(false);
                const chatWindow = ref(null);

                const send = async () => {
                    if (!input.value.trim() || loading.value) return;

                    const q = input.value;
                    history.value.push({ role: 'user', content: q });
                    input.value = '';
                    loading.value = true;

                    try {
                        const res = await axios.post('/chat', { prompt: q });
                        history.value.push({
                            role: 'assistant',
                            content: res.data.answer,
                            sources: res.data.sources
                        });
                        // 自动滚动到底部
                        await nextTick();
                        chatWindow.value.scrollTop = chatWindow.value.scrollHeight;
                    } catch (e) {
                        history.value.push({ role: 'assistant', content: '系统连接失败: ' + e.message });
                    } finally {
                        loading.value = false;
                    }
                };

                return { input, history, loading, send, chatWindow };
            }
        }).mount('#app');
    </script>
</body>
</html>

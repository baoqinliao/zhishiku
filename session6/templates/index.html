<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>私有知识库 - 全栈版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; margin: 0; }
        #app { max-width: 900px; margin: 30px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
        header { background: #2c3e50; color: white; padding: 20px; border-radius: 12px 12px 0 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #eee; }
        .message { margin-bottom: 20px; max-width: 85%; }
        .user { align-self: flex-end; margin-left: auto; }
        .bubble { padding: 12px 16px; border-radius: 15px; line-height: 1.6; }
        .user .bubble { background: #3498db; color: white; border-bottom-right-radius: 2px; }
        .assistant .bubble { background: #f1f3f5; color: #333; border-bottom-left-radius: 2px; }
        .source-img { width: 120px; border: 2px solid #ddd; border-radius: 6px; margin: 10px 10px 0 0; cursor: zoom-in; }
        .preview-area { padding: 10px 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid #1a73e8; }
        footer { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { background: #2ecc71; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #bdc3c7; }

        .progress-container { width: 100%; height: 4px; background: #eee; position: relative; margin: 10px 0; display: none; }
    .progress-bar { height: 100%; background: #1a73e8; width: 0%; transition: width 0.3s; }

    /* 聊天气泡内图片的样式 */
    .chat-img { max-width: 250px; border-radius: 8px; margin-top: 10px; display: block; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .user .bubble { background: #3498db; color: white; border-bottom-right-radius: 2px; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h2 style="margin:0">私有知识库助手</h2>
            <small>基于 Qwen2.5-7B & ChromaDB</small>
        </header>

        <div id="chat-window" ref="chatWindow">
            <div v-for="(msg, i) in history" :key="i" :class="['message', msg.role]">
                <div class="bubble">[[ msg.content ]]
                <img v-if="msg.img" :src="msg.img" class="chat-img" @click="window.open(msg.img)">
                </div>
                <div v-if="msg.sources && msg.sources.length" style="display:flex; flex-wrap:wrap">
                    <img v-for="src in msg.sources" :src="src" class="source-img" @click="window.open(src)">
                </div>
            </div>
        </div>

        <div class="progress-container" :style="{ display: loading ? 'block' : 'none' }">
        <div class="progress-bar" :style="{ width: uploadProgress + '%' }"></div>
    </div>

        <div v-if="imgPreview" class="preview-area">
        <div style="position:relative">
            <img :src="imgPreview" class="preview-img">
            <span @click="clearImg" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; width:18px; height:18px; text-align:center; font-size:12px; cursor:pointer">×</span>
        </div>
    </div>
        <footer>
            <label class="upload-btn">
            📷
            <input type="file" style="display:none" @change="handleFile" accept="image/*">
        </label>
            <input v-model="input" @keyup.enter="send" :disabled="loading" placeholder="问问我关于护发素或服务器的信息...">
            <button @click="send" :disabled="loading">[[ loading ? 'AI 思考中...' : '发送' ]]</button>
        </footer>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;
        createApp({
            delimiters: ['[[', ']]'], // 防止与 Jinja2 冲突
            setup() {
                const input = ref('');
           const imgPreview = ref(null);
            const imgBase64 = ref(null);
            const uploadProgress = ref(0);
                const history = ref([{ role: 'assistant', content: '您好！我是您的私有知识库助手，我已经读完了您的所有资料。请问有什么可以帮您？' }]);
                const loading = ref(false);
                const chatWindow = ref(null);


                const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imgPreview.value = ev.target.result;
                    imgBase64.value = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const clearImg = () => { imgPreview.value = null; imgBase64.value = null; };

                const send = async () => {
                    if (!input.value.trim() && !imgBase64.value || loading.value) return;

                    const q = input.value;
                    const userImg = imgBase64.value;
                    console.log(userImg)
                    history.value.push({ role: 'user', content: q || (userImg ? "[图片提问]" : "") ,img: userImg});
                    input.value = '';
                    clearImg();
                    loading.value = true;
                    uploadProgress.value = 10;

                    try {

                        const timer = setInterval(() => {
                        if (uploadProgress.value < 90) uploadProgress.value += 5;
                    }, 500);

                        const res = await axios.post('/chat', { prompt: q ,image: userImg},{
                            onUploadProgress: (progressEvent) => {
                                // 如果是真实大文件上传，这里会起作用
                                let percent = Math.round((progressEvent.loaded * 100) / progressEvent.total);
                                if (percent > uploadProgress.value) uploadProgress.value = percent;
                            }


                        });


                    clearInterval(timer);
                    uploadProgress.value = 100;

                        history.value.push({
                            role: 'assistant',
                            content: res.data.answer,
                            sources: res.data.sources
                        });
                        // 自动滚动到底部
                        await nextTick();
                        chatWindow.value.scrollTop = chatWindow.value.scrollHeight;
                    } catch (e) {
                        history.value.push({ role: 'assistant', content: '系统连接失败: ' + e.message });
                    } finally {
                        loading.value = false;
                        setTimeout(() => { uploadProgress.value = 0; }, 500);

                    }
                };

                return { input, history, loading, send, chatWindow ,imgPreview,handleFile,clearImg,uploadProgress};
            }
        }).mount('#app');
    </script>
</body>
</html>
